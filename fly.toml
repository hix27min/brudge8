app = "nekto-bridge"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8765"

[[services]]
  internal_port = 8765
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
